<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confetti Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            z-index: 10;
            position: relative;
        }

        h1 {
            color: white;
            font-size: 3em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .button-group {
            display: flex;
            gap: 15px;
        }

        button {
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        #start-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        #start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        #start-btn:active {
            transform: scale(0.98);
        }

        #clear-btn {
            background: rgba(255, 255, 255, 0.9);
            color: #667eea;
        }

        #clear-btn:hover {
            background: white;
            transform: scale(1.05);
        }

        #clear-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>

    <div class="container">
        <h1>🎉 Confetti Party! 🎉</h1>
        <div class="button-group">
            <button id="start-btn">Start Confetti</button>
            <button id="clear-btn">Clear</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const clearBtn = document.getElementById('clear-btn');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        let animationId = null;

        // Particle class
        class Confetti {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = Math.random() * -8 - 3;
                this.gravity = 0.2;
                this.decay = Math.random() * 0.015 + 0.015;
                this.opacity = 1;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                this.size = Math.random() * 8 + 4;
                this.type = Math.floor(Math.random() * 3); // 0: square, 1: circle, 2: ribbon
                this.color = this.getRandomColor();
            }

            getRandomColor() {
                const colors = [
                    '#FF6B6B', '#4ECDC4', '#45B7D1',
                    '#FFA07A', '#98D8C8', '#F7DC6F',
                    '#BB8FCE', '#85C1E2', '#F8B88B',
                    '#52C41A', '#1890FF', '#FA541C'
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotationSpeed;
                this.opacity -= this.decay;
            }

            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                switch (this.type) {
                    case 0: // Square
                        ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                        break;
                    case 1: // Circle
                        ctx.beginPath();
                        ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
                        ctx.fill();
                        break;
                    case 2: // Ribbon/strip
                        ctx.fillRect(-this.size / 2, -this.size / 4, this.size, this.size / 2);
                        break;
                }

                ctx.restore();
            }

            isOffScreen() {
                return this.y > canvas.height + 50 || this.opacity <= 0;
            }
        }

        function createConfetti() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 4;
            const burstCount = 100;

            for (let i = 0; i < burstCount; i++) {
                particles.push(new Confetti(
                    centerX + (Math.random() - 0.5) * 100,
                    centerY
                ));
            }
        }

        function animate() {
            // Clear canvas
            ctx.fillStyle = 'rgba(255, 255, 255, 0)';
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Update and draw particles
            particles = particles.filter(p => !p.isOffScreen());

            particles.forEach(particle => {
                particle.update();
                particle.draw(ctx);
            });

            if (particles.length > 0) {
                animationId = requestAnimationFrame(animate);
            }
        }

        function startAnimation() {
            createConfetti();
            if (!animationId) {
                animate();
            }
        }

        function clearConfetti() {
            particles = [];
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        startBtn.addEventListener('click', startAnimation);
        clearBtn.addEventListener('click', clearConfetti);

        // Handle window resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Initial animation on page load
        window.addEventListener('load', () => {
            startAnimation();
        });
    </script>
</body>
</html>
