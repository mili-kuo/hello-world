<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Mili</title>\n    <style>\n        body {\n            margin: 0;\n            padding: 0;\n            height: 100vh;\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);\n            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;\n        }\n        \n        .card {\n            background: white;\n            padding: 40px;\n            border-radius: 12px;\n            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);\n            text-align: center;\n            max-width: 500px;\n            animation: slideIn 0.6s ease-out;\n        }\n        \n        @keyframes slideIn {\n            from {\n                opacity: 0;\n                transform: translateY(-20px);\n            }\n            to {\n                opacity: 1;\n                transform: translateY(0);\n            }\n        }\n        \n        h1 {\n            color: #667eea;\n            margin: 0 0 20px 0;\n            font-size: 48px;\n        }\n        \n        p {\n            color: #666;\n            line-height: 1.6;\n            font-size: 16px;\n            margin: 15px 0;\n        }\n        \n        .button {\n            display: inline-block;\n            margin-top: 20px;\n            padding: 12px 30px;\n            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);\n            color: white;\n            text-decoration: none;\n            border-radius: 6px;\n            transition: transform 0.3s ease, box-shadow 0.3s ease;\n        }\n        \n        .button:hover {\n            transform: translateY(-2px);\n            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);\n        }\n    </style>\n</head>\n<body>\n    <div class=\"card\">\n        <h1>Mili</h1>
