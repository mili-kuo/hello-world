<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .city-selector {
            margin-bottom: 20px;
        }

        .city-selector label {
            display: block;
            color: #666;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .city-selector select {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            background: white;
            color: #333;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .city-selector select:hover {
            border-color: #667eea;
        }

        .city-selector select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .location {
            color: #666;
            font-size: 18px;
            margin-bottom: 5px;
        }

        .last-update {
            color: #999;
            font-size: 12px;
        }

        .weather-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 30px 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            color: white;
        }

        .temperature {
            font-size: 60px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .weather-icon {
            font-size: 80px;
        }

        .weather-description {
            color: #333;
            text-align: center;
            font-size: 18px;
            text-transform: capitalize;
            margin: 15px 0;
            font-weight: 500;
        }

        .details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 25px 0;
        }

        .detail-card {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .detail-card label {
            display: block;
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .detail-card .value {
            color: #333;
            font-size: 24px;
            font-weight: bold;
        }

        .forecast {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }

        .forecast h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .forecast-items {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .forecast-item {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-size: 12px;
        }

        .forecast-item .day {
            font-weight: bold;
            margin-bottom: 8px;
        }

        .forecast-item .icon {
            font-size: 28px;
            margin: 8px 0;
        }

        .forecast-item .temp {
            font-size: 14px;
            font-weight: bold;
        }

        .refresh-btn {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .refresh-btn:active {
            transform: translateY(0);
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: 600;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌍 Weather Dashboard</h1>
            
            <div class="city-selector">
                <label for="cityDropdown">Select a City:</label>
                <select id="cityDropdown" onchange="handleCityChange()">
                    <option value="">-- Choose a City --</option>
                    <option value="New York">New York</option>
                    <option value="Los Angeles">Los Angeles</option>
                    <option value="Chicago">Chicago</option>
                    <option value="Houston">Houston</option>
                    <option value="Miami">Miami</option>
                </select>
            </div>

            <div class="location" id="location">Select a city from the dropdown</div>
            <div class="last-update" id="lastUpdate"></div>
        </div>

        <div id="errorContainer"></div>

        <div id="loadingContainer" class="loading" style="display: none;">
            Loading weather data...
        </div>

        <div id="weatherData" style="display: none;">
            <div class="weather-main">
                <div class="temperature" id="temperature">--°C</div>
                <div class="weather-icon" id="icon">☁️</div>
            </div>

            <div class="weather-description" id="description">--</div>

            <div class="details">
                <div class="detail-card">
                    <label>Feels Like</label>
                    <div class="value" id="feelsLike">--°C</div>
                </div>
                <div class="detail-card">
                    <label>Humidity</label>
                    <div class="value" id="humidity">--%</div>
                </div>
                <div class="detail-card">
                    <label>Wind Speed</label>
                    <div class="value" id="windSpeed">-- m/s</div>
                </div>
                <div class="detail-card">
                    <label>Pressure</label>
                    <div class="value" id="pressure">-- hPa</div>
                </div>
            </div>

            <div class="forecast">
                <h3>5-Day Forecast</h3>
                <div class="forecast-items" id="forecastContainer">
                    <div class="forecast-item">
                        <div class="day">Mon</div>
                        <div class="icon">☀️</div>
                        <div class="temp">24°C</div>
                    </div>
                    <div class="forecast-item">
                        <div class="day">Tue</div>
                        <div class="icon">⛅</div>
                        <div class="temp">22°C</div>
                    </div>
                    <div class="forecast-item">
                        <div class="day">Wed</div>
                        <div class="icon">🌧️</div>
                        <div class="temp">18°C</div>
                    </div>
                    <div class="forecast-item">
                        <div class="day">Thu</div>
                        <div class="icon">☀️</div>
                        <div class="temp">23°C</div>
                    </div>
                    <div class="forecast-item">
                        <div class="day">Fri</div>
                        <div class="icon">⛈️</div>
                        <div class="temp">19°C</div>
                    </div>
                </div>
            </div>

            <button class="refresh-btn" onclick="refreshWeather()">🔄 Refresh Weather</button>
        </div>
    </div>

    <script>
        const weatherIcons = {
            'Clear': '☀️',
            'Clouds': '☁️',
            'Rain': '🌧️',
            'Drizzle': '🌦️',
            'Thunderstorm': '⛈️',
            'Snow': '❄️',
            'Mist': '🌫️',
            'Smoke': '🌫️',
            'Haze': '🌫️',
            'Dust': '🌪️',
            'Fog': '🌫️',
            'Sand': '🌪️',
            'Ash': '🌫️',
            'Squall': '🌪️',
            'Tornado': '🌪️'
        };

        const usaCities = {
            'New York': { lat: 40.7128, lon: -74.0060 },
            'Los Angeles': { lat: 34.0522, lon: -118.2437 },
            'Chicago': { lat: 41.8781, lon: -87.6298 },
            'Houston': { lat: 29.7604, lon: -95.3698 },
            'Miami': { lat: 25.7617, lon: -80.1918 }
        };

        let currentCity = '';

        function getWeatherIcon(description) {
            for (const [key, icon] of Object.entries(weatherIcons)) {
                if (description.includes(key)) {
                    return icon;
                }
            }
            return '🌤️';
        }

        function handleCityChange() {
            const cityDropdown = document.getElementById('cityDropdown');
            const selectedCity = cityDropdown.value;

            if (selectedCity) {
                currentCity = selectedCity;
                fetchWeatherForCity(selectedCity);
            } else {
                document.getElementById('weatherData').style.display = 'none';
                document.getElementById('location').textContent = 'Select a city from the dropdown';
                document.getElementById('errorContainer').innerHTML = '';
            }
        }

        function showLoading() {
            document.getElementById('loadingContainer').style.display = 'block';
            document.getElementById('weatherData').style.display = 'none';
        }

        function hideLoading() {
            document.getElementById('loadingContainer').style.display = 'none';
        }

        async function fetchWeatherForCity(cityName) {
            try {
                showLoading();
                const coords = usaCities[cityName];
                
                if (!coords) {
                    showError('City not found');
                    return;
                }

                await getWeatherByCoords(coords.lat, coords.lon, cityName);
            } catch (error) {
                console.error('Error fetching weather:', error);
                showError('Failed to fetch weather data');
                hideLoading();
            }
        }

        async function getWeatherByCoords(lat, lon, cityName) {
            try {
                const apiKey = 'e8c1255529a881e82e5b631b9e3e6432'; // Free tier API key
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${apiKey}`
                );

                if (!response.ok) {
                    throw new Error('Weather API error');
                }

                const data = await response.json();
                hideLoading();
                displayWeather(data);
            } catch (error) {
                console.error('Error:', error);
                hideLoading();
                showError('Unable to fetch weather. Please try again.');
            }
        }

        function displayWeather(data) {
            document.getElementById('location').textContent = `📍 ${data.name}, ${data.sys.country}`;
            document.getElementById('temperature').textContent = `${Math.round(data.main.temp)}°C`;
            document.getElementById('feelsLike').textContent = `${Math.round(data.main.feels_like)}°C`;
            document.getElementById('humidity').textContent = `${data.main.humidity}%`;
            document.getElementById('windSpeed').textContent = `${data.wind.speed.toFixed(1)} m/s`;
            document.getElementById('pressure').textContent = `${data.main.pressure} hPa`;
            document.getElementById('description').textContent = data.weather[0].main;
            document.getElementById('icon').textContent = getWeatherIcon(data.weather[0].main);
            document.getElementById('lastUpdate').textContent = `Last updated: ${new Date().toLocaleTimeString()}`;

            document.getElementById('weatherData').style.display = 'block';
            document.getElementById('errorContainer').innerHTML = '';
        }

        function showError(message) {
            hideLoading();
            document.getElementById('errorContainer').innerHTML = `<div class="error">${message}</div>`;
            document.getElementById('weatherData').style.display = 'none';
        }

        function refreshWeather() {
            if (currentCity) {
                fetchWeatherForCity(currentCity);
            }
        }
    </script>
</body>
</html>
