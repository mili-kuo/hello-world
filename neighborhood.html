<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neighborhood</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #4A90E2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        .neighborhood {
            display: flex;
            gap: 60px;
            justify-content: center;
            align-items: flex-end;
        }

        .house {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .house-body {
            width: 150px;
            height: 120px;
            border-radius: 0 0 10px 10px;
            margin-bottom: 5px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .house-roof {
            width: 0;
            height: 0;
            border-left: 90px solid transparent;
            border-right: 90px solid transparent;
            border-bottom: 70px solid;
            margin-bottom: -5px;
            margin-left: -15px;
        }

        .door {
            width: 40px;
            height: 60px;
            background-color: #8B4513;
            border-radius: 5px;
            margin: 30px auto 0;
            position: relative;
        }

        .door-knob {
            width: 8px;
            height: 8px;
            background-color: #FFD700;
            border-radius: 50%;
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
        }

        .window {
            width: 30px;
            height: 30px;
            background-color: #87CEEB;
            border-radius: 3px;
            margin: 15px 10px 0;
            border: 2px solid #333;
            position: relative;
        }

        .window::before,
        .window::after {
            content: '';
            position: absolute;
            background-color: #333;
        }

        .window::before {
            width: 100%;
            height: 2px;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
        }

        .window::after {
            width: 2px;
            height: 100%;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
        }

        .windows {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        .pink-house .house-body {
            background-color: #FF69B4;
        }

        .pink-house .house-roof {
            border-bottom-color: #FF1493;
        }

        .blue-house .house-body {
            background-color: #4169E1;
        }

        .blue-house .house-roof {
            border-bottom-color: #1E90FF;
        }

        .label {
            margin-top: 20px;
            font-weight: bold;
            color: white;
            font-size: 14px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="neighborhood">
        <div class="house pink-house">
            <div class="house-roof"></div>
            <div class="house-body">
                <div class="windows">
                    <div class="window"></div>
                    <div class="window"></div>
                </div>
                <div class="door">
                    <div class="door-knob"></div>
                </div>
            </div>
            <div class="label">Pink House</div>
        </div>

        <div class="house blue-house">
            <div class="house-roof"></div>
            <div class="house-body">
                <div class="windows">
                    <div class="window"></div>
                    <div class="window"></div>
                </div>
                <div class="door">
                    <div class="door-knob"></div>
                </div>
            </div>
            <div class="label">Blue House</div>
        </div>
    </div>
</body>
</html>
