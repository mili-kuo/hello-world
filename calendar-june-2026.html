<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar - June 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .calendar-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 30px;
            max-width: 600px;
            width: 100%;
        }

        .calendar-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .calendar-header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 5px;
        }

        .calendar-header p {
            color: #666;
            font-size: 1.1em;
        }

        .calendar {
            width: 100%;
            border-collapse: collapse;
        }

        .calendar thead th {
            background-color: #667eea;
            color: white;
            padding: 15px;
            font-weight: 600;
            font-size: 1em;
            border: none;
        }

        .calendar tbody td {
            border: 1px solid #e0e0e0;
            padding: 12px;
            text-align: right;
            height: 80px;
            vertical-align: top;
            background-color: #fafafa;
            font-size: 1.1em;
            font-weight: 500;
            color: #333;
            transition: background-color 0.3s ease;
        }

        .calendar tbody td:hover {
            background-color: #f0f0f0;
        }

        .calendar tbody td.other-month {
            color: #ccc;
            background-color: #f5f5f5;
        }

        .calendar tbody td.today {
            background-color: #ffd700;
            font-weight: bold;
            color: #333;
        }

        .calendar tbody td.weekend {
            background-color: #f0e6ff;
        }

        .calendar tbody td.weekend.other-month {
            background-color: #f8f8f8;
        }

        .calendar-info {
            margin-top: 30px;
            text-align: center;
            color: #666;
            font-size: 0.95em;
            line-height: 1.6;
        }

        @media (max-width: 600px) {
            .calendar-container {
                padding: 15px;
            }

            .calendar-header h1 {
                font-size: 2em;
            }

            .calendar thead th {
                padding: 10px 5px;
                font-size: 0.9em;
            }

            .calendar tbody td {
                padding: 8px 4px;
                height: 70px;
                font-size: 0.95em;
            }
        }
    </style>
</head>
<body>
    <div class="calendar-container">
        <div class="calendar-header">
            <h1>June 2026</h1>
            <p>📅 Calendar View</p>
        </div>

        <table class="calendar">
            <thead>
                <tr>
                    <th>Sun</th>
                    <th>Mon</th>
                    <th>Tue</th>
                    <th>Wed</th>
                    <th>Thu</th>
                    <th>Fri</th>
                    <th>Sat</th>
                </tr>
            </thead>
            <tbody>
                <!-- Row 1: May 31 - June 6 -->
                <tr>
                    <td class="other-month">31</td>
                    <td>1</td>
                    <td>2</td>
                    <td>3</td>
                    <td>4</td>
                    <td>5</td>
                    <td class="weekend">6</td>
                </tr>
                <!-- Row 2: June 7-13 -->
                <tr>
                    <td class="weekend">7</td>
                    <td>8</td>
                    <td>9</td>
                    <td>10</td>
                    <td>11</td>
                    <td>12</td>
                    <td class="weekend">13</td>
                </tr>
                <!-- Row 3: June 14-20 -->
                <tr>
                    <td class="weekend">14</td>
                    <td>15</td>
                    <td>16</td>
                    <td>17</td>
                    <td>18</td>
                    <td>19</td>
                    <td class="weekend">20</td>
                </tr>
                <!-- Row 4: June 21-27 -->
                <tr>
                    <td class="weekend">21</td>
                    <td>22</td>
                    <td>23</td>
                    <td>24</td>
                    <td>25</td>
                    <td>26</td>
                    <td class="weekend">27</td>
                </tr>
                <!-- Row 5: June 28-30 and July 1-4 -->
                <tr>
                    <td class="weekend">28</td>
                    <td>29</td>
                    <td>30</td>
                    <td class="other-month">1</td>
                    <td class="other-month">2</td>
                    <td class="other-month">3</td>
                    <td class="weekend other-month">4</td>
                </tr>
            </tbody>
        </table>

        <div class="calendar-info">
            <p><strong>June 2026</strong> has 30 days</p>
            <p>Starts on Monday • Ends on Tuesday</p>
        </div>
    </div>
</body>
</html>
