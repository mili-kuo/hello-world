<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yellow Background Page</title>
    <style>
        body {
            background-color: yellow;
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        img {
            max-width: 400px;
            height: auto;
            margin: 20px 0;
            border-radius: 8px;
        }
        .updated-text {
            font-size: 72px;
            font-weight: bold;
            color: #ff6b6b;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin: 30px 0;
            text-align: center;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <h1>Welcome</h1>
    <div class="updated-text">Updated!!</div>
    <p>This page has a yellow background.</p>
    <img src="https://images.unsplash.com/photo-1587182382346-e659e7aa0406?w=400" alt="Fresh bananas">
    <p>Enjoy these delicious bananas!</p>
</body>
</html>
