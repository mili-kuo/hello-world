<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confetti!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .container {
            text-align: center;
            background: white;
            padding: 60px 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 480px;
            width: 90%;
            position: relative;
            z-index: 1;
        }

        .emoji {
            font-size: 4em;
            margin-bottom: 16px;
        }

        h1 {
            color: #333;
            font-size: 2.2em;
            margin-bottom: 12px;
            font-weight: 700;
        }

        p {
            color: #666;
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        #startBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 48px;
            font-size: 1.2em;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.5);
            letter-spacing: 0.03em;
        }

        #startBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(102, 126, 234, 0.65);
        }

        #startBtn:active {
            transform: translateY(0);
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <canvas id="confettiCanvas"></canvas>

    <div class="container">
        <div class="emoji">🎉</div>
        <h1>Ready to celebrate?</h1>
        <p>Hit the button below and let the confetti fly!</p>
        <button id="startBtn">Start</button>
    </div>

    <script>
        const canvas = document.getElementById('confettiCanvas');
        const ctx = canvas.getContext('2d');

        const COLORS = [
            '#f44336', '#e91e63', '#9c27b0', '#673ab7',
            '#3f51b5', '#2196f3', '#03a9f4', '#00bcd4',
            '#009688', '#4caf50', '#8bc34a', '#cddc39',
            '#ffeb3b', '#ffc107', '#ff9800', '#ff5722',
        ];

        const SHAPES = ['rect', 'circle', 'ribbon'];

        let particles = [];
        let animationId = null;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function randomBetween(a, b) {
            return a + Math.random() * (b - a);
        }

        function createParticle() {
            const shape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
            return {
                x: randomBetween(0, canvas.width),
                y: randomBetween(-20, -canvas.height * 0.2),
                w: randomBetween(8, 16),
                h: randomBetween(6, 12),
                r: randomBetween(4, 8),          // radius for circles
                color: COLORS[Math.floor(Math.random() * COLORS.length)],
                shape,
                angle: randomBetween(0, Math.PI * 2),
                spin: randomBetween(-0.12, 0.12),
                vx: randomBetween(-2, 2),
                vy: randomBetween(2.5, 6),
                gravity: randomBetween(0.06, 0.12),
                opacity: 1,
                fade: randomBetween(0.005, 0.012),
            };
        }

        function drawParticle(p) {
            ctx.save();
            ctx.globalAlpha = p.opacity;
            ctx.fillStyle = p.color;
            ctx.strokeStyle = p.color;
            ctx.translate(p.x, p.y);
            ctx.rotate(p.angle);

            if (p.shape === 'circle') {
                ctx.beginPath();
                ctx.arc(0, 0, p.r, 0, Math.PI * 2);
                ctx.fill();
            } else if (p.shape === 'ribbon') {
                ctx.beginPath();
                ctx.lineWidth = 3;
                ctx.moveTo(-p.w / 2, 0);
                ctx.bezierCurveTo(-p.w / 4, -p.h, p.w / 4, p.h, p.w / 2, 0);
                ctx.stroke();
            } else {
                ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            }

            ctx.restore();
        }

        function updateParticle(p) {
            p.vy += p.gravity;
            p.x += p.vx;
            p.y += p.vy;
            p.angle += p.spin;
            // Fade out only after passing the middle of the screen
            if (p.y > canvas.height * 0.6) {
                p.opacity -= p.fade;
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles = particles.filter(p => p.opacity > 0 && p.y < canvas.height + 40);

            for (const p of particles) {
                updateParticle(p);
                drawParticle(p);
            }

            if (particles.length > 0) {
                animationId = requestAnimationFrame(animate);
            } else {
                animationId = null;
            }
        }

        function launchConfetti() {
            resize();

            // Cancel any existing animation so we can restart cleanly
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }

            particles = [];

            // Burst: spawn particles in waves so they don't all appear at once
            const TOTAL = 200;
            const WAVES = 6;
            const perWave = Math.ceil(TOTAL / WAVES);

            for (let w = 0; w < WAVES; w++) {
                setTimeout(() => {
                    for (let i = 0; i < perWave; i++) {
                        particles.push(createParticle());
                    }
                }, w * 120);
            }

            // Start the draw loop
            animationId = requestAnimationFrame(animate);
        }

        document.getElementById('startBtn').addEventListener('click', launchConfetti);
        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
